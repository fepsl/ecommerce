<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — ModaShop</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="../index.html" class="navbar-brand">Moda<span>Shop</span></a>
    </div>
</nav>

<main>
    <div class="form-card">
        <h1>Entrar</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <div id="error-msg" class="form-error" style="display:none"></div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem" id="submit-btn">
                Entrar
            </button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.9rem">
            Não tem conta? <a href="register.html">Cadastre-se</a>
        </p>
    </div>
</main>

<script type="module">
    import { login, isAuthenticated } from '../js/auth.js';

    if (isAuthenticated()) window.location.href = '../index.html';

    document.querySelector('#login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.querySelector('#submit-btn');
        const errEl = document.querySelector('#error-msg');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Entrando...';

        try {
            await login(
                document.querySelector('#email').value,
                document.querySelector('#password').value
            );
            window.location.href = '../pages/products.html';
        } catch (err) {
            errEl.textContent = err.message;
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    });
</script>
</body>
</html>
