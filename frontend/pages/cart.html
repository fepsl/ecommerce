<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho — VELN</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="/js/config.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="../index.html" class="navbar-brand">VELN</a>
        <ul class="navbar-nav">
            <li><a href="products.html">Produtos</a></li>
            <li class="cart-icon">
                <a href="cart.html">Carrinho <span id="cart-count">0</span></a>
            </li>
        </ul>
    </div>
</nav>

<main class="container">
    <div class="page-header"><h1>Carrinho</h1></div>

    <div class="cart-layout">
        <div id="cart-items"></div>

        <div class="cart-summary">
            <h3>Resumo</h3>
            <div style="display:flex;justify-content:space-between;margin-bottom:1.5rem">
                <span style="color:var(--text-muted);font-size:.85rem;text-transform:uppercase;letter-spacing:.08em">Total</span>
                <strong id="cart-total" style="font-size:1.1rem;font-weight:400">R$ 0,00</strong>
            </div>
            <button id="checkout-btn" class="btn btn-primary" style="width:100%">Finalizar Compra</button>
            <div id="checkout-msg" style="margin-top:.75rem;font-size:.85rem;text-align:center;color:var(--text-muted)"></div>
        </div>
    </div>
</main>

<script type="module">
    import { getCart, removeFromCart, updateQuantity, getCartTotal, checkout, updateCartCount } from '../js/cart.js';
    import { isAuthenticated } from '../js/auth.js';

    function render() {
        const cart = getCart();
        updateCartCount();

        document.querySelector('#cart-total').textContent =
            'R$ ' + getCartTotal().toFixed(2).replace('.', ',');

        const container = document.querySelector('#cart-items');

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p class="empty-title">Seu carrinho está vazio</p>
                    <p class="empty-sub">Descubra nossa coleção e encontre algo que vale a pena.</p>
                    <a href="products.html" class="btn btn-secondary">Ver coleção</a>
                </div>`;
            return;
        }

        container.innerHTML = cart.map(item => `
            <div class="cart-item">
                <img src="https://via.placeholder.com/80x107/141414/f0f0f0?text=${encodeURIComponent(item.name.charAt(0))}"
                     alt="${item.name}">
                <div class="cart-item-info">
                    <h4>${item.name}</h4>
                    <p class="cart-item-price">R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                </div>
                <input type="number" class="qty-input" value="${item.quantity}" min="1"
                       data-id="${item.id}" style="margin:0 .5rem">
                <button class="btn btn-secondary remove-btn" data-id="${item.id}"
                        style="padding:.4rem .8rem;font-size:.75rem">✕</button>
            </div>
        `).join('');

        container.querySelectorAll('.remove-btn').forEach(btn =>
            btn.addEventListener('click', () => { removeFromCart(btn.dataset.id); render(); }));

        container.querySelectorAll('.qty-input').forEach(input =>
            input.addEventListener('change', () => { updateQuantity(input.dataset.id, +input.value); render(); }));
    }

    document.querySelector('#checkout-btn').addEventListener('click', async () => {
        const msg = document.querySelector('#checkout-msg');
        if (!isAuthenticated()) {
            msg.innerHTML = '<a href="login.html">Faça login</a> para finalizar o pedido';
            return;
        }
        try {
            document.querySelector('#checkout-btn').disabled = true;
            const order = await checkout();
            msg.style.color = 'var(--text)';
            msg.textContent = `Pedido #${order.id.slice(0, 8)} criado com sucesso!`;
            render();
            setTimeout(() => window.location.href = 'orders.html', 2000);
        } catch (err) {
            msg.style.color = 'var(--text-muted)';
            msg.textContent = err.message;
            document.querySelector('#checkout-btn').disabled = false;
        }
    });

    render();
</script>
</body>
</html>
