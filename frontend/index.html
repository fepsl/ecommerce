<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELN — E-commerce de Roupas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="index.html" class="navbar-brand">VELN</a>
        <ul class="navbar-nav">
            <li><a href="pages/products.html">Produtos</a></li>
            <li id="nav-auth"><a href="pages/login.html">Entrar</a></li>
            <li class="cart-icon">
                <a href="pages/cart.html">Carrinho <span id="cart-count">0</span></a>
            </li>
        </ul>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1>Moda que combina com você</h1>
        <p>Camisetas, calças, vestidos e acessórios com qualidade e estilo</p>
        <div class="hero-actions">
            <a href="pages/products.html" class="btn-hero btn-hero-primary">Ver Produtos</a>
            <a href="pages/register.html" class="btn-hero btn-hero-outline">Criar conta</a>
        </div>
    </div>
</section>

<section class="features">
    <div class="container">
        <div class="features-values">
            <span>Frete Rápido</span>
            <span>Compra Segura</span>
            <span>30 dias para troca</span>
            <span>Até 12x sem juros</span>
        </div>
    </div>
</section>

<script type="module">
    import { isAuthenticated, logout, getCurrentUser } from './js/auth.js';
    import { updateCartCount } from './js/cart.js';

    updateCartCount();

    const navAuth = document.querySelector('#nav-auth');
    if (isAuthenticated()) {
        const user = getCurrentUser();
        navAuth.innerHTML = `
            <span style="color:var(--text-muted)">${user.name.split(' ')[0]}</span>
            <a href="#" id="logout-btn" style="margin-left:.5rem">Sair</a>
        `;
        document.querySelector('#logout-btn').addEventListener('click', e => {
            e.preventDefault();
            logout();
        });
    }
</script>
</body>
</html>
